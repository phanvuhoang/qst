PerlModule Apache::DBI
PerlRequire /home/startup.pl
PerlOptions +GlobalRequest

<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/qst

    <Directory /var/www/qst>
        Options FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    DirectoryIndex index.htm

    # All .htm files use QST handler
    <LocationMatch "(?i)\.htm$">
        SetHandler perl-script
        PerlResponseHandler MyApache2::QST
    </LocationMatch>

    ErrorLog /dev/stderr
    CustomLog /dev/stdout combined
</VirtualHost>
