# Apache config for QST — mod_perl handler
# https://qstonline.org

PerlPostConfigRequire /home/startup.pl

<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/qst

    <Directory /var/www/qst>
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted

        <FilesMatch "\.htm$">
            SetHandler modperl
            PerlResponseHandler MyApache2::QST
        </FilesMatch>
    </Directory>

    <LocationMatch "^/$">
        SetHandler modperl
        PerlResponseHandler MyApache2::QST
    </LocationMatch>

    # Handle /qst.htm and any other .htm files via mod_perl
    <LocationMatch "(?i)\.htm$">
        SetHandler modperl
        PerlResponseHandler MyApache2::QST
    </LocationMatch>

    ErrorLog /dev/stderr
    CustomLog /dev/stdout combined
</VirtualHost>
