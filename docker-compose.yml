name: qst

services:
  mysql:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: Qst#captain2
      MYSQL_DATABASE: qst
      MYSQL_USER: qst
      MYSQL_PASSWORD: Qst#captain2
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --max-allowed-packet=64M
    volumes:
      - qst-mysql:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "qst", "-pQst#captain2"]
      interval: 10s
      timeout: 5s
      retries: 10

  qst-web:
    image: ghcr.io/phanvuhoang/qst-web:latest
    environment:
      QST_DB_HOST: mysql
      QST_DB_NAME: qst
      QST_DB_USER: qst
      QST_DB_PASS: "Qst#captain2"
    networks:
      - default
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.http.routers.qst.rule=Host(`assessments.learnfor.me`)
      - traefik.http.routers.qst.entrypoints=websecure
      - traefik.http.routers.qst.tls.certresolver=letsencrypt
      - traefik.http.services.qst.loadbalancer.server.port=80
      - traefik.docker.network=dokploy-network
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

networks:
  dokploy-network:
    external: true

volumes:
  qst-mysql:
